<style>
  /* ===========================================================
     1. DESIGN TOKENS — Duolingo green base, Apple Music depth,
                        Linear restraint
     =========================================================== */
  :root {
    /* Brand */
    --green:        #58CC02;
    --green-2:      #4CAF00;
    --green-deep:   #3F9700;
    --green-glow:   rgba(88,204,2,0.45);
    --green-soft:   #EAFBD7;

    --red:          #FF4B4B;
    --red-deep:     #D63838;
    --red-glow:     rgba(255,75,75,0.35);

    --orange:       #FF9600;
    --orange-deep:  #E07F00;
    --orange-glow:  rgba(255,150,0,0.4);

    --yellow:       #FFC800;
    --yellow-deep:  #E0AE00;

    --blue:         #1CB0F6;
    --blue-deep:    #0E8FD0;

    --purple:       #A560E8;
    --purple-deep:  #823CC0;

    --cyan:         #00CDB7;

    /* Neutrals — warm, slightly creamy (not pure white) */
    --bg:           #FBF9F2;
    --bg-2:         #F4F1E8;
    --surface:      #FFFFFF;
    --surface-2:    #F8F6EE;

    /* Ink — neutral with a hint of warmth */
    --ink:          #1A1D24;
    --ink-2:        #3C4148;
    --ink-3:        #6B7280;
    --ink-4:        #9CA3AF;
    --ink-5:        #D6D3CA;

    --line:         #ECE9DD;
    --line-2:       #E2DED1;
    --line-soft:    #F2EFE5;

    /* Elevation — Apple Music–style soft layered shadows */
    --shadow-1: 0 1px 2px rgba(20,22,28,.04), 0 2px 4px rgba(20,22,28,.04);
    --shadow-2: 0 1px 2px rgba(20,22,28,.05), 0 4px 12px rgba(20,22,28,.06), 0 12px 32px rgba(20,22,28,.06);
    --shadow-3: 0 2px 4px rgba(20,22,28,.06), 0 8px 24px rgba(20,22,28,.08), 0 20px 48px rgba(20,22,28,.10);
    --shadow-press: 0 1px 2px rgba(20,22,28,.06);

    /* Duolingo's signature "raised button" stack */
    --raise-green:  inset 0 -4px 0 var(--green-deep);
    --raise-red:    inset 0 -4px 0 var(--red-deep);
    --raise-blue:   inset 0 -4px 0 var(--blue-deep);
    --raise-purple: inset 0 -4px 0 var(--purple-deep);
    --raise-orange: inset 0 -4px 0 var(--orange-deep);
    --raise-yellow: inset 0 -4px 0 var(--yellow-deep);
    --raise-mute:   inset 0 -4px 0 #D8D5C8;

    /* Radii */
    --r-xs: 8px;
    --r-sm: 12px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 28px;
    --r-pill: 999px;

    /* Type */
    --font-sans: "Plus Jakarta Sans", "PingFang SC", "HarmonyOS Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "DM Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;

    /* Motion */
    --ease: cubic-bezier(.22,.61,.36,1);
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
    --d-fast: 140ms;
    --d-base: 220ms;
    --d-slow: 360ms;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background:
      radial-gradient(1200px 600px at 50% -100px, #EAFBD7 0%, transparent 60%),
      radial-gradient(900px 700px at 100% 100%, #FFF6DB 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    user-select: none;
    letter-spacing: -0.01em;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    letter-spacing: inherit;
  }
  svg { display: block; }

  /* ===========================================================
     2. TOP BAR — glass + tight stats row
     =========================================================== */
  #topbar {
    position: sticky; top: 0; z-index: 50;
    height: 64px;
    padding: 0 18px;
    display: flex; align-items: center; gap: 18px;
    background: rgba(251,249,242,0.78);
    backdrop-filter: saturate(180%) blur(18px);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    border-bottom: 1px solid var(--line);
  }
  .stat {
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 700;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    transition: transform var(--d-base) var(--ease-spring);
  }
  .stat-icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
  .stat.hearts { color: var(--red); }
  .stat.streak { color: var(--orange); }
  .stat.xp     { color: var(--green-deep); }
  .stat.level  {
    color: var(--purple);
    background: linear-gradient(135deg, #A560E8 0%, #6B40C0 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    padding: 0 8px;
    border-radius: var(--r-pill);
    font-weight: 800;
  }
  .stat.level::before {
    content: "";
    display: inline-block;
    width: 14px; height: 14px;
    margin-right: 5px;
    background: linear-gradient(135deg, #A560E8, #6B40C0);
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l2.6 5.6 6.1.7-4.6 4.2 1.3 6L12 15.6 6.6 18.5l1.3-6L3.3 8.3l6.1-.7L12 2z" fill="black"/></svg>') no-repeat center / contain;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l2.6 5.6 6.1.7-4.6 4.2 1.3 6L12 15.6 6.6 18.5l1.3-6L3.3 8.3l6.1-.7L12 2z" fill="black"/></svg>') no-repeat center / contain;
    vertical-align: -2px;
  }

  .top-spacer { flex: 1; }

  .toggle-group {
    display: inline-flex;
    padding: 3px;
    background: var(--surface-2);
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .toggle-btn {
    padding: 5px 12px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-3);
    transition: all var(--d-fast) var(--ease);
    line-height: 1;
    min-width: 32px;
  }
  .toggle-btn.on {
    background: var(--surface);
    color: var(--ink);
    box-shadow: var(--shadow-1);
  }
  .toggle-btn:hover:not(.on) { color: var(--ink-2); }

  /* BGM toggle button — top-right */
  .bgm-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    transition: all var(--d-fast) var(--ease);
    flex-shrink: 0;
    position: relative;
  }
  .bgm-btn:hover { color: var(--ink-2); border-color: var(--ink-5); }
  .bgm-btn.on {
    background: linear-gradient(180deg, #79DD22, var(--green));
    color: white;
    border-color: var(--green-deep);
    box-shadow: 0 0 0 2px rgba(88,204,2,0.18), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .bgm-btn.on::after {
    content: "";
    position: absolute;
    top: -3px; right: -3px;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid var(--surface);
    animation: bgmPulse 2.4s ease-in-out infinite;
  }
  @keyframes bgmPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.4); opacity: 0.6; }
  }

  /* ===========================================================
     3. MIDI status pill
     =========================================================== */
  #midi-pill {
    position: fixed; top: 78px; right: 18px; z-index: 40;
    padding: 7px 12px 7px 10px;
    border-radius: var(--r-pill);
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line);
    color: var(--ink-2);
    display: inline-flex; align-items: center; gap: 7px;
    box-shadow: var(--shadow-1);
    transition: all var(--d-base) var(--ease);
  }
  #midi-pill .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink-4);
    box-shadow: 0 0 0 0 currentColor;
    animation: ledPulse 2s infinite;
  }
  #midi-pill.connected { color: var(--green-deep); border-color: rgba(88,204,2,0.4); background: rgba(234,251,215,0.85); }
  #midi-pill.connected .led { background: var(--green); box-shadow: 0 0 0 4px rgba(88,204,2,0.18); }
  #midi-pill.warning   { color: var(--orange-deep); border-color: rgba(255,150,0,0.35); background: rgba(255,243,219,0.85); }
  #midi-pill.warning .led { background: var(--orange); }
  #midi-pill.error     { color: var(--red-deep); border-color: rgba(255,75,75,0.3); background: rgba(255,232,232,0.85); }
  #midi-pill.error .led { background: var(--red); }
  @keyframes ledPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* ===========================================================
     4. VIEWS
     =========================================================== */
  .view { display: none; min-height: calc(100vh - 64px); padding: 20px 16px 100px; }
  .view.active { display: block; }
  #view-lesson.active { display: flex; flex-direction: column; }

  /* ===========================================================
     5. HOME / PATH MAP
     =========================================================== */
  #view-home { max-width: 540px; margin: 0 auto; }
  .home-header {
    text-align: center;
    padding: 16px 0 8px;
  }
  .home-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: var(--surface);
    padding: 5px 12px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-1);
    margin-bottom: 14px;
  }
  .home-eyebrow::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(88,204,2,0.2);
  }
  .home-title {
    font-size: 28px; font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.025em;
    line-height: 1.1;
  }
  .home-sub {
    font-size: 14px; color: var(--ink-3);
    margin-top: 8px;
    font-weight: 500;
  }

  /* ----- Module banner ----- */
  .module-block { margin: 36px 0 8px; }
  .module-banner {
    color: white;
    border-radius: var(--r-lg);
    padding: 18px 20px;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.02em;
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-2);
  }
  .module-banner::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 90% -20%, rgba(255,255,255,0.32) 0%, transparent 50%),
      radial-gradient(circle at 0% 120%, rgba(0,0,0,0.18) 0%, transparent 55%);
    pointer-events: none;
  }
  .module-banner > * { position: relative; z-index: 1; }
  .module-banner.onboarding { background: linear-gradient(135deg, #6CDB14 0%, #4CAF00 60%, #3F9700 100%); }
  .module-banner.melody     { background: linear-gradient(135deg, #4FC8FF 0%, #1CB0F6 60%, #0E8FD0 100%); }
  .module-banner.chord      { background: linear-gradient(135deg, #C68BFF 0%, #A560E8 60%, #7733C5 100%); }
  .module-banner.rhythm     { background: linear-gradient(135deg, #FFB347 0%, #FF9600 60%, #E07F00 100%); }
  .module-banner-left {
    display: flex; align-items: center; gap: 12px;
  }
  .module-banner-icon {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    background: rgba(255,255,255,0.18);
    border-radius: var(--r-sm);
    backdrop-filter: blur(8px);
  }
  .module-banner-meta {
    font-size: 12px;
    opacity: 0.92;
    font-weight: 600;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
    background: rgba(0,0,0,0.18);
    padding: 5px 10px;
    border-radius: var(--r-pill);
  }

  /* ----- Path with real SVG connector ----- */
  .path {
    position: relative;
    padding: 28px 0 16px;
  }
  .path-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .path-svg .track-bg {
    fill: none;
    stroke: var(--line-2);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 2 12;
  }
  .path-svg .track-fill {
    fill: none;
    stroke: url(#trackGrad);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dasharray 600ms var(--ease);
  }

  .node-row {
    position: relative; z-index: 2;
    display: flex;
    padding: 24px 0;
  }
  .node-row > .node-slot { flex: 1; display: flex; }
  .node-row > .node-slot.center { justify-content: center; }
  .node-row > .node-slot.left   { justify-content: flex-start; padding-left: 14%; }
  .node-row > .node-slot.right  { justify-content: flex-end; padding-right: 14%; }

  .lesson-node {
    position: relative;
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--ink-4);
    display: grid; place-items: center;
    box-shadow:
      var(--raise-mute),
      0 8px 18px rgba(20,22,28,0.06);
    transition:
      transform var(--d-base) var(--ease-spring),
      box-shadow var(--d-base) var(--ease);
    cursor: not-allowed;
  }
  .lesson-node svg {
    width: 36px; height: 36px;
    transition: transform var(--d-base) var(--ease-spring);
  }
  .lesson-node.unlocked,
  .lesson-node.completed {
    background: linear-gradient(180deg, #6FDB10 0%, var(--green) 100%);
    color: white;
    box-shadow:
      var(--raise-green),
      0 8px 22px rgba(88,204,2,0.32);
    cursor: pointer;
  }
  .lesson-node.completed { background: linear-gradient(180deg, #6FDB10 0%, var(--green-2) 100%); }
  .lesson-node.unlocked:hover,
  .lesson-node.completed:hover { transform: translateY(-2px); }
  .lesson-node.unlocked:active,
  .lesson-node.completed:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 -2px 0 var(--green-deep),
      0 4px 10px rgba(88,204,2,0.25);
  }
  .lesson-node.current {
    background: linear-gradient(180deg, #FFFFFF 0%, #FAFFF0 100%);
    color: var(--green-deep);
    box-shadow:
      inset 0 0 0 4px var(--green),
      var(--raise-green),
      0 8px 22px rgba(88,204,2,0.35),
      0 0 0 0 rgba(88,204,2,0.4);
    animation: currentPulse 2.4s ease-in-out infinite;
    cursor: pointer;
  }
  .lesson-node.boss {
    background: linear-gradient(180deg, #FFE057 0%, var(--yellow) 100%);
    color: #6B4A00;
    box-shadow:
      var(--raise-yellow),
      0 8px 22px rgba(255,200,0,0.42);
  }
  .lesson-node.boss.current {
    background: linear-gradient(180deg, #FFFAE3 0%, #FFF6D2 100%);
    color: var(--yellow-deep);
    box-shadow:
      inset 0 0 0 4px var(--yellow),
      var(--raise-yellow),
      0 8px 22px rgba(255,200,0,0.45);
  }
  @keyframes currentPulse {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  .lesson-node .ring {
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 2px solid var(--green);
    opacity: 0;
    pointer-events: none;
  }
  .lesson-node.current .ring {
    animation: ringExpand 2.4s ease-out infinite;
  }
  @keyframes ringExpand {
    0%   { opacity: 0.55; transform: scale(0.85); }
    80%  { opacity: 0;    transform: scale(1.25); }
    100% { opacity: 0;    transform: scale(1.25); }
  }

  .lesson-stars {
    position: absolute;
    bottom: -10px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 2px 8px;
    font-size: 10px; font-weight: 700;
    color: var(--yellow-deep);
    white-space: nowrap;
    box-shadow: var(--shadow-1);
    letter-spacing: 1px;
  }
  .lesson-label {
    position: absolute;
    top: -34px; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 700;
    background: var(--surface);
    padding: 5px 11px;
    border-radius: var(--r-pill);
    color: var(--ink);
    box-shadow: var(--shadow-1);
    border: 1px solid var(--line);
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .lesson-label::after {
    content: "";
    position: absolute;
    bottom: -5px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 7px; height: 7px;
    background: var(--surface);
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  /* ===========================================================
     6. LESSON VIEW
     =========================================================== */
  #view-lesson {
    max-width: 620px; margin: 0 auto;
    width: 100%;
    padding-top: 12px;
  }

  .lesson-progress {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 0 22px;
  }
  .lesson-quit {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface);
    color: var(--ink-3);
    font-size: 18px; font-weight: 700;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-1);
    transition: all var(--d-fast) var(--ease);
  }
  .lesson-quit:hover { color: var(--ink); transform: scale(1.05); }
  .progress-bar {
    flex: 1; height: 14px;
    background: var(--surface-2);
    border-radius: var(--r-pill);
    overflow: hidden;
    border: 1px solid var(--line);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(180deg, #79DD22 0%, var(--green) 50%, var(--green-2) 100%);
    border-radius: var(--r-pill);
    transition: width 480ms var(--ease);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -2px 0 var(--green-deep);
    position: relative;
    overflow: hidden;
  }
  .progress-fill::after {
    content: "";
    position: absolute;
    top: 2px; left: 6px; right: 12px;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    border-radius: var(--r-pill);
  }

  .question-card {
    background: var(--surface);
    border-radius: var(--r-xl);
    padding: 28px 24px;
    box-shadow: var(--shadow-2);
    border: 1px solid var(--line);
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
  }
  .q-prompt {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 10px;
  }
  .q-title {
    font-size: 24px; font-weight: 800;
    color: var(--ink);
    margin-bottom: 22px;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }

  /* Target pills (for T8) */
  .target-pills {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 4px 0 22px;
    padding: 14px;
    background: var(--surface-2);
    border-radius: var(--r-md);
    border: 1px solid var(--line);
  }
  .target-pill {
    background: var(--surface);
    padding: 10px 16px;
    border-radius: var(--r-sm);
    font-weight: 800;
    font-size: 17px;
    color: var(--ink);
    min-width: 44px;
    text-align: center;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-1);
    transition: all var(--d-base) var(--ease-spring);
    font-family: var(--font-mono);
    letter-spacing: 0;
  }
  .target-pill.done {
    background: linear-gradient(180deg, #6FDB10, var(--green));
    color: white;
    border-color: transparent;
    box-shadow: var(--raise-green), 0 4px 10px rgba(88,204,2,0.25);
  }
  .target-pill.now {
    background: var(--surface);
    border: 2px solid var(--green);
    color: var(--green-deep);
    transform: translateY(-2px) scale(1.06);
    box-shadow: 0 0 0 4px rgba(88,204,2,0.18), var(--shadow-2);
    animation: pillPulse 1.2s ease-in-out infinite;
  }
  @keyframes pillPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(88,204,2,0.18), var(--shadow-2); }
    50%      { box-shadow: 0 0 0 8px rgba(88,204,2,0.08), var(--shadow-2); }
  }

  /* Keyboard — sized for full PartyKeys 36-key range (C3..B5).
     21 white keys across; whites + blacks both absolute-positioned
     within .keyboard-inner so % math is consistent and blacks
     center exactly on the white-key boundary. */
  .keyboard {
    position: relative;
    margin: 18px auto 4px;
    height: 150px;
    max-width: 720px;
    background: linear-gradient(180deg, #1A1D24 0%, #0E1014 100%);
    padding: 14px 10px 10px;
    border-radius: var(--r-md);
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,0.5),
      var(--shadow-1);
  }
  .keyboard-inner {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .key {
    position: absolute;
    top: 0;
    height: 100%;
    cursor: pointer;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 8px;
    font-size: 9px; font-weight: 700;
    transition: transform 60ms var(--ease), filter 60ms var(--ease);
    font-family: var(--font-mono);
    box-sizing: border-box;
  }
  .key.white {
    background: linear-gradient(180deg, #FDFDFB 0%, #EFECE2 100%);
    border-radius: 0 0 5px 5px;
    color: var(--ink-4);
    border-left: 1px solid rgba(0,0,0,0.10);
    border-right: 1px solid rgba(0,0,0,0.04);
    box-shadow:
      inset 0 -4px 0 rgba(0,0,0,0.18),
      inset 0 1px 0 rgba(255,255,255,0.7),
      0 2px 3px rgba(0,0,0,0.35);
  }
  .key.white:first-of-type { border-left: none; }
  .key.black {
    height: 64%;
    background: linear-gradient(180deg, #2C3138 0%, #14181D 80%, #0A0D11 100%);
    color: rgba(255,255,255,.45);
    z-index: 2;
    border-radius: 0 0 4px 4px;
    box-shadow:
      inset 0 -3px 0 rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.1),
      0 3px 5px rgba(0,0,0,0.45);
    padding-bottom: 7px;
  }
  .key:active, .key.pressed {
    transform: translateY(2px);
    box-shadow:
      inset 0 -2px 0 rgba(0,0,0,0.18),
      0 1px 2px rgba(0,0,0,0.3);
  }
  /* ----------------------------------------------------------
     Lit-key colors — color values match actual PartyKeys LED
     protocol (hex from CLAUDE.md). The bright top-stop simulates
     the LED's emissive brightness so key looks "lit" on screen.
     LED protocol colors:
       0x01 red    #7f0000   0x07 green  #0e7f1f
       0x03 orange #7f1500   0x08 cyan   #137f60
       0x05 yellow #7f5500   0x09 blue   #08307f
       0x0C purple #4b007f
     ---------------------------------------------------------- */
  .key.lit-red     { background: linear-gradient(180deg, #ff5050 0%, #b30000 50%, #7f0000 100%) !important; color: white !important; box-shadow: inset 0 -3px 0 #5a0000, inset 0 2px 8px rgba(255,140,140,0.9), 0 0 18px 2px rgba(127,0,0,0.85); }
  .key.lit-orange  { background: linear-gradient(180deg, #ff7030 0%, #c63500 50%, #7f1500 100%) !important; color: white !important; box-shadow: inset 0 -3px 0 #5a0c00, inset 0 2px 8px rgba(255,170,120,0.85), 0 0 18px 2px rgba(127,21,0,0.8); }
  .key.lit-yellow  { background: linear-gradient(180deg, #ffc850 0%, #c08000 50%, #7f5500 100%) !important; color: #2a1c00 !important; box-shadow: inset 0 -3px 0 #5a3c00, inset 0 2px 8px rgba(255,220,140,0.9), 0 0 18px 2px rgba(127,85,0,0.8); }
  .key.lit-green   { background: linear-gradient(180deg, #4be066 0%, #1aa835 50%, #0e7f1f 100%) !important; color: white !important; box-shadow: inset 0 -3px 0 #064c12, inset 0 2px 8px rgba(140,255,170,0.9), 0 0 18px 2px rgba(14,127,31,0.85); }
  .key.lit-cyan    { background: linear-gradient(180deg, #50e0bd 0%, #20a785 50%, #137f60 100%) !important; color: white !important; box-shadow: inset 0 -3px 0 #084c39, inset 0 2px 8px rgba(140,240,220,0.85), 0 0 18px 2px rgba(19,127,96,0.8); }
  .key.lit-blue    { background: linear-gradient(180deg, #4080ff 0%, #1850c0 50%, #08307f 100%) !important; color: white !important; box-shadow: inset 0 -3px 0 #03194c, inset 0 2px 8px rgba(150,180,255,0.9), 0 0 18px 2px rgba(8,48,127,0.85); }
  .key.lit-purple  { background: linear-gradient(180deg, #b070ff 0%, #7728c0 50%, #4b007f 100%) !important; color: white !important; box-shadow: inset 0 -3px 0 #2c004c, inset 0 2px 8px rgba(210,160,255,0.9), 0 0 18px 2px rgba(75,0,127,0.85); }
  /* black-key variants: same color, deeper top so black-key context holds */
  .key.black.lit-red     { background: linear-gradient(180deg, #b30000 0%, #7f0000 60%, #4a0000 100%) !important; }
  .key.black.lit-orange  { background: linear-gradient(180deg, #c63500 0%, #7f1500 60%, #4a0a00 100%) !important; }
  .key.black.lit-yellow  { background: linear-gradient(180deg, #c08000 0%, #7f5500 60%, #4a3200 100%) !important; color: white !important; }
  .key.black.lit-green   { background: linear-gradient(180deg, #1aa835 0%, #0e7f1f 60%, #064a12 100%) !important; }
  .key.black.lit-cyan    { background: linear-gradient(180deg, #20a785 0%, #137f60 60%, #094a39 100%) !important; }
  .key.black.lit-blue    { background: linear-gradient(180deg, #1850c0 0%, #08307f 60%, #03194a 100%) !important; }
  .key.black.lit-purple  { background: linear-gradient(180deg, #7728c0 0%, #4b007f 60%, #2c004a 100%) !important; }

  /* Choice grid */
  .choice-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin: 8px 0 4px;
  }
  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--line-2);
    border-radius: var(--r-md);
    padding: 18px 14px;
    font-size: 18px; font-weight: 800;
    color: var(--ink);
    text-align: center;
    box-shadow: var(--raise-mute), var(--shadow-1);
    transition: all var(--d-fast) var(--ease);
    font-family: var(--font-mono);
    letter-spacing: 0;
  }
  .choice-btn:hover {
    border-color: var(--blue);
    color: var(--blue-deep);
    background: linear-gradient(180deg, #FFFFFF, #F4FBFF);
    transform: translateY(-1px);
  }
  .choice-btn:active { transform: translateY(2px); box-shadow: inset 0 -2px 0 #D8D5C8; }
  .choice-btn.correct {
    background: linear-gradient(180deg, #6FDB10, var(--green));
    color: white;
    border-color: transparent;
    box-shadow: var(--raise-green), 0 4px 14px rgba(88,204,2,0.3);
  }
  .choice-btn.wrong {
    background: linear-gradient(180deg, #FF7575, var(--red));
    color: white;
    border-color: transparent;
    box-shadow: var(--raise-red), 0 4px 14px rgba(255,75,75,0.3);
    animation: shake 360ms var(--ease);
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  /* Replay button */
  .replay-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 6px auto 18px;
    background: linear-gradient(180deg, #4FC8FF, var(--blue));
    color: white;
    padding: 11px 22px;
    border-radius: var(--r-pill);
    font-size: 14px; font-weight: 700;
    box-shadow: var(--raise-blue), 0 4px 12px rgba(28,176,246,0.28);
    transition: all var(--d-fast) var(--ease);
    letter-spacing: -0.01em;
  }
  .replay-btn::before {
    content: "";
    width: 14px; height: 14px;
    background: white;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 11a9 9 0 0 1 15-6.7L21 2v7h-7l2.7-2.7A6 6 0 0 0 5 12H3z M21 13a9 9 0 0 1-15 6.7L3 22v-7h7l-2.7 2.7A6 6 0 0 0 19 12h2z" fill="black"/></svg>') no-repeat center / contain;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 11a9 9 0 0 1 15-6.7L21 2v7h-7l2.7-2.7A6 6 0 0 0 5 12H3z M21 13a9 9 0 0 1-15 6.7L3 22v-7h7l-2.7 2.7A6 6 0 0 0 19 12h2z" fill="black"/></svg>') no-repeat center / contain;
  }
  .replay-btn:active { transform: translateY(2px); box-shadow: inset 0 -2px 0 var(--blue-deep), 0 2px 6px rgba(28,176,246,0.2); }

  /* Inline replay container */
  .replay-wrap { text-align: center; }

  /* CTA bottom bar */
  .cta-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--line);
    padding: 18px 16px 24px;
    display: none;
    z-index: 30;
    backdrop-filter: blur(20px);
    box-shadow: 0 -8px 24px rgba(20,22,28,0.06);
  }
  .cta-bar.show { display: block; animation: ctaSlide 320ms var(--ease-spring); }
  @keyframes ctaSlide {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .cta-bar.win  {
    background: linear-gradient(180deg, #F4FFE8 0%, #EAFBD7 100%);
    border-top-color: rgba(88,204,2,0.4);
  }
  .cta-bar.lose {
    background: linear-gradient(180deg, #FFF2F2 0%, #FFE5E5 100%);
    border-top-color: rgba(255,75,75,0.4);
  }
  .cta-feedback {
    max-width: 620px; margin: 0 auto 12px;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .cta-feedback::before {
    content: "";
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-grid; place-items: center;
    flex-shrink: 0;
  }
  .cta-feedback.win  { color: var(--green-deep); }
  .cta-feedback.win::before {
    background: var(--green);
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="black"/><path d="M7 12l3.5 3.5L17 9" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat center / contain;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="black"/><path d="M7 12l3.5 3.5L17 9" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat center / contain;
  }
  .cta-feedback.lose { color: var(--red-deep); }
  .cta-feedback.lose::before {
    background: var(--red);
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="black"/><path d="M8 8l8 8M16 8l-8 8" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>') no-repeat center / contain;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="black"/><path d="M8 8l8 8M16 8l-8 8" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>') no-repeat center / contain;
  }

  .cta-btn {
    display: block;
    max-width: 620px; margin: 0 auto;
    background: linear-gradient(180deg, #6FDB10, var(--green) 60%, var(--green-2));
    color: white;
    padding: 16px;
    border-radius: var(--r-md);
    font-size: 16px; font-weight: 800;
    text-align: center;
    box-shadow:
      var(--raise-green),
      0 6px 16px rgba(88,204,2,0.32);
    width: 100%;
    letter-spacing: -0.01em;
    transition: all var(--d-fast) var(--ease);
    text-transform: uppercase;
    font-size: 15px;
    letter-spacing: 0.04em;
  }
  .cta-btn:hover { filter: brightness(1.04); }
  .cta-btn:active {
    transform: translateY(2px);
    box-shadow: inset 0 -2px 0 var(--green-deep), 0 2px 6px rgba(88,204,2,0.2);
  }
  .cta-btn.lose {
    background: linear-gradient(180deg, #FF7575, var(--red) 60%, var(--red-deep));
    box-shadow: var(--raise-red), 0 6px 16px rgba(255,75,75,0.32);
  }
  .cta-btn.lose:active { box-shadow: inset 0 -2px 0 var(--red-deep), 0 2px 6px rgba(255,75,75,0.2); }

  /* ===========================================================
     7. RESULT VIEW — celebration animation
     =========================================================== */
  #view-result {
    max-width: 520px; margin: 0 auto;
    text-align: center;
    position: relative;
  }
  #view-result.active {
    animation: resultEnter 480ms var(--ease-spring);
  }
  @keyframes resultEnter {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #mascot-result {
    margin: 24px auto 8px;
    width: 140px; height: 140px;
    position: relative;
  }
  #mascot-result::before {
    content: "";
    position: absolute;
    inset: -20px;
    background:
      radial-gradient(circle, rgba(255,200,0,0.35) 0%, transparent 60%);
    border-radius: 50%;
    animation: glowPulse 2.4s ease-in-out infinite;
    z-index: -1;
  }
  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%      { transform: scale(1.08); opacity: 1; }
  }
  .result-header {
    font-size: 32px; font-weight: 800;
    margin: 18px 0 6px;
    color: var(--green-deep);
    letter-spacing: -0.03em;
  }
  .result-subhead {
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .stars-display {
    display: flex; justify-content: center; gap: 14px;
    margin: 26px 0;
  }
  .star {
    width: 64px; height: 64px;
    background: var(--surface-2);
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink-5);
    transition: all 480ms var(--ease-spring);
    box-shadow: var(--raise-mute), var(--shadow-1);
    border: 1px solid var(--line);
    position: relative;
  }
  .star svg { width: 32px; height: 32px; }
  .star.on {
    background: linear-gradient(180deg, #FFE057, var(--yellow) 60%, var(--yellow-deep));
    color: white;
    transform: scale(1.18) rotate(-4deg);
    box-shadow:
      inset 0 -3px 0 #B08800,
      0 8px 22px rgba(255,200,0,0.5),
      0 0 0 0 rgba(255,200,0,0.4);
    border-color: transparent;
    animation: starPop 600ms var(--ease-spring);
  }
  .star.on:nth-child(2) { animation-delay: 220ms; }
  .star.on:nth-child(3) { animation-delay: 440ms; }
  @keyframes starPop {
    0%   { transform: scale(0.4) rotate(-30deg); opacity: 0; }
    60%  { transform: scale(1.3) rotate(8deg); opacity: 1; }
    100% { transform: scale(1.18) rotate(-4deg); }
  }

  .reward-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin: 24px 0;
  }
  .reward-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px 14px;
    text-align: center;
    box-shadow: var(--shadow-2);
    position: relative;
    overflow: hidden;
  }
  .reward-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--green);
  }
  .reward-card.streak::before { background: var(--orange); }
  .reward-card .lbl {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 6px;
  }
  .reward-card .val {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
  }
  .reward-card.xp .val     { color: var(--green-deep); }
  .reward-card.streak .val { color: var(--orange-deep); }

  /* Confetti container */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 70;
  }
  .confetti-piece {
    position: absolute;
    top: -10px;
    width: 10px; height: 14px;
    border-radius: 2px;
    opacity: 0;
  }

  /* Continue button on result page */
  #result-continue {
    margin-top: 8px;
  }

  /* ===========================================================
     8. MASCOT
     =========================================================== */
  #mascot {
    position: fixed;
    bottom: 100px; left: 16px;
    z-index: 60;
    display: none;
    align-items: flex-end;
    gap: 12px;
    pointer-events: none;
    max-width: 380px;
  }
  #mascot.show {
    display: flex;
    animation: mascotEnter 380ms var(--ease-spring);
  }
  @keyframes mascotEnter {
    from { opacity: 0; transform: translateY(12px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .mascot-svg { width: 100%; height: 100%; flex-shrink: 0; }
  /* 3D mascot via model-viewer */
  model-viewer.mascot-3d {
    width: 100%;
    height: 100%;
    background: transparent;
    --poster-color: transparent;
    --progress-bar-color: transparent;
    --progress-bar-height: 0;
    --progress-mask: transparent;
    filter: drop-shadow(0 8px 14px rgba(20,22,28,0.22));
  }
  /* Containers that hold a model-viewer need explicit size.
     3D characters need more pixels than 2D SVG to read clearly. */
  #mascot-svg-slot { width: 130px; height: 130px; display: block; flex-shrink: 0; }
  #mascot-result   { width: 220px; height: 220px; margin: 20px auto 8px; display: block; }
  .gate-mascot     { width: 220px; height: 220px; margin: 0 auto 18px; display: block; }
  .speech-bubble {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
    padding: 12px 14px;
    max-width: 240px;
    font-size: 13px; font-weight: 600;
    color: var(--ink);
    position: relative;
    box-shadow: var(--shadow-2);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .speech-bubble::before {
    content: "";
    position: absolute;
    left: -8px; bottom: 0px;
    width: 14px; height: 14px;
    background: var(--surface);
    border-left: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    transform: skewY(-30deg);
    border-radius: 0 0 0 4px;
  }

  /* ===========================================================
     9. GATE / NO-MIDI VIEW
     =========================================================== */
  #view-gate {
    max-width: 440px; margin: 40px auto 0;
    text-align: center; padding: 0 16px 80px;
  }
  .gate-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    padding: 36px 26px 30px;
    box-shadow: var(--shadow-3);
    margin-top: 24px;
  }
  .gate-mascot {
    width: 220px; height: 220px;
    margin: 0 auto 18px;
    display: block;
    filter: drop-shadow(0 8px 18px rgba(20,22,28,0.15));
  }
  .gate-title {
    font-size: 24px; font-weight: 800;
    margin-bottom: 10px;
    letter-spacing: -0.025em;
  }
  .gate-sub {
    font-size: 14px; color: var(--ink-3);
    margin-bottom: 24px; line-height: 1.6;
    font-weight: 500;
  }
  .gate-btn {
    background: linear-gradient(180deg, #6FDB10, var(--green) 60%, var(--green-2));
    color: white;
    padding: 14px 24px;
    border-radius: var(--r-md);
    font-size: 14px; font-weight: 800;
    box-shadow: var(--raise-green), 0 4px 12px rgba(88,204,2,0.28);
    margin: 6px;
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all var(--d-fast) var(--ease);
  }
  .gate-btn.secondary {
    background: var(--surface);
    color: var(--ink-2);
    border: 1px solid var(--line-2);
    box-shadow: var(--raise-mute), var(--shadow-1);

<script>
"use strict";

/* ============================================================
   1) STATE & PERSISTENCE
   ============================================================ */
const SAVE_KEY = "pk_lessons_v1";
const DEFAULT_STATE = {
  xp: 0, level: 1,
  hearts: 3, heartsRefillAt: 0,
  streak: 0, streakLastDay: "",
  starsByLesson: {},
  unlockedUpTo: "0.1",
  lang: "zh", tone: "kid",
  bgm: false,
};
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return { ...DEFAULT_STATE };
    return { ...DEFAULT_STATE, ...JSON.parse(raw) };
  } catch (e) { return { ...DEFAULT_STATE }; }
}
function saveState() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* ============================================================
   2) i18n + TONE
   ============================================================ */
const DICT = {
  home_title:   { zh: "PartyKeys 小琴课", en: "PartyKeys Lessons" },
  home_sub:     { zh: "跟着灯走 · 5 分钟一课", en: "Follow the lights · 5 min a lesson" },
  result_great: { zh: "太棒了！", en: "Great job!" },
  streak:       { zh: "连击", en: "Streak" },
  continue:     { zh: "继续", en: "Continue" },
  gate_title:   { zh: "需要 PartyKeys 36 Keys", en: "PartyKeys 36 Keys required" },
  gate_sub:     { zh: "这门课每节都用 LED 灯告诉你弹哪。请把 PartyKeys 用 USB 接入电脑，然后用支持 Web MIDI 的浏览器（Chrome / Edge）打开。",
                  en: "Every lesson uses LEDs to show what to play. Plug your PartyKeys via USB and open this page in a Web-MIDI browser (Chrome or Edge)." },
  gate_retry:   { zh: "重新检测", en: "Retry detection" },
  gate_demo:    { zh: "没设备？先用屏幕键盘试玩", en: "No device? Try with on-screen keyboard" },
  midi_checking:{ zh: "检测中…", en: "Checking…" },
  midi_pk:      { zh: "PartyKeys 已连接", en: "PartyKeys connected" },
  midi_generic: { zh: "MIDI 已连接（非 PartyKeys）", en: "MIDI connected (not PartyKeys)" },
  midi_none:    { zh: "未检测到 MIDI 设备", en: "No MIDI device detected" },
  midi_denied:  { zh: "浏览器拒绝了 MIDI 权限", en: "Browser denied MIDI permission" },
  midi_unsup:   { zh: "浏览器不支持 Web MIDI", en: "Web MIDI not supported" },
  module_onboard:{ zh: "入门导引", en: "Onboarding" },
  module_melody:{ zh: "旋律", en: "Melody" },
  module_chord: { zh: "和弦", en: "Chord" },
  module_rhythm:{ zh: "节奏", en: "Rhythm" },
  module_locked:{ zh: "（敬请期待）", en: "(coming soon)" },
  cta_correct:  { zh: "对！太棒了", en: "Correct!" },
  cta_wrong:    { zh: "再试一次", en: "Try again" },
  cta_done:     { zh: "完成本关", en: "Complete lesson" },
  q_play_lit:   { zh: "弹亮起来的键", en: "Play the lit key" },
  q_echo:       { zh: "听完后弹一遍", en: "Listen then play" },
  q_choose:     { zh: "你听到的是？", en: "What did you hear?" },
  q_sequence:   { zh: "按顺序记住并弹回", en: "Memorize the sequence" },
  q_perform:    { zh: "完整弹一段", en: "Play the full piece" },
  hint_replay:  { zh: "再听一遍", en: "Replay" },
  ming_intro_kid:   { zh: "你好呀！我是鸣鸣 准备好弹琴了吗？", en: "Hi! I'm Ming-Ming. Ready to play?" },
  ming_intro_adult: { zh: "欢迎。每课约 5 分钟，跟随 LED 提示完成即可。", en: "Welcome. Each lesson takes ~5 min — follow the LEDs." },
  ming_correct_kid: { zh: "哇，你真棒！", en: "Wow, well done!" },
  ming_correct_adult:{ zh: "正确。", en: "Correct." },
  ming_wrong_kid:   { zh: "没关系，我们再来！", en: "It's okay, let's try again!" },
  ming_wrong_adult: { zh: "再试一次。", en: "Try again." },
  ming_demo_kid:    { zh: "看好啦，我弹给你看", en: "Watch — I'll show you" },
  ming_demo_adult:  { zh: "演示：跟随 LED 顺序。", en: "Demo: follow the LED order." },
  starbar_perfect:  { zh: "满分通过！", en: "Perfect run!" },
  starbar_good:     { zh: "干得好", en: "Nice work" },
  starbar_pass:     { zh: "完成", en: "Completed" },
};

function t(key) {
  const e = DICT[key];
  if (!e) return key;
  return e[state.lang] || e.zh;
}

function applyI18n() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.innerHTML = t(el.getAttribute("data-i18n"));
  });
  document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
}

function setLang(l) { state.lang = l; saveState(); refreshToggles(); applyI18n(); refreshPath(); }
function setTone(t) { state.tone = t; saveState(); refreshToggles(); }

function refreshToggles() {
  document.getElementById("lang-zh").classList.toggle("on", state.lang === "zh");
  document.getElementById("lang-en").classList.toggle("on", state.lang === "en");
  document.getElementById("tone-kid").classList.toggle("on", state.tone === "kid");
  document.getElementById("tone-adult").classList.toggle("on", state.tone === "adult");
}

/* ============================================================
   3) MIDI / LED / SYSEX
   ============================================================ */
const LED_COLORS = {
  off: 0, red: 0x01, orange: 0x03, yellow: 0x05,
  yellowgreen: 0x06, green: 0x07, cyan: 0x08, blue: 0x09,
  deepblue: 0x0A, indigo: 0x0B, purple: 0x0C, white: 0x06,
};
const LED_ROLE = {
  target: "green", candidate: "yellow", beat: "blue",
  root: "purple", third: "orange", reference: "cyan", wrong: "red",
};

let midiAccess = null;
let midiInputs = [];
let midiOutputs = [];
let pkOutput = null;     // device matching /partykey/i for SysEx LED
let onMidiNote = null;   // (note, velocity, isOn) callback
let demoMode = false;    // on-screen keyboard fallback when no PartyKeys

function setMidiPill(text, klass) {
  const pill = document.getElementById("midi-pill");
  pill.classList.remove("connected","warning","error");
  if (klass) pill.classList.add(klass);
  document.getElementById("midi-text").textContent = text;
}

async function initMidi() {
  if (!navigator.requestMIDIAccess) {
    setMidiPill(t("midi_unsup"), "error");
    showView("view-gate"); return;
  }
  try {
    setMidiPill(t("midi_checking"));
    midiAccess = await navigator.requestMIDIAccess({ sysex: true });
    midiAccess.onstatechange = scanMidi;
    scanMidi();
  } catch (e) {
    setMidiPill(t("midi_denied"), "error");
    showView("view-gate");
  }
}
function scanMidi() {
  if (!midiAccess) return;
  midiInputs = []; midiOutputs = []; pkOutput = null;
  for (const input of midiAccess.inputs.values()) {
    midiInputs.push(input);
    input.onmidimessage = handleMidiMessage;
  }
  for (const output of midiAccess.outputs.values()) {
    midiOutputs.push(output);
    if (/partykey/i.test(output.name)) pkOutput = output;
  }
  const pkInput = midiInputs.find(d => /partykey/i.test(d.name));
  if (pkOutput) {
    setMidiPill(t("midi_pk"), "connected");
    pkLedInit(pkOutput);
    pkAllOff(pkOutput);
    if (currentView === "view-gate") showView("view-home");
  } else if (midiInputs.length > 0) {
    setMidiPill(t("midi_generic"), "warning");
  } else if (!demoMode) {
    setMidiPill(t("midi_none"), "error");
    if (currentView === "view-home" || currentView === "view-gate") showView("view-gate");
  }
}

function handleMidiMessage(event) {
  const [status, note, velocity] = event.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && velocity > 0) {
    // Audible response — same as virtual on-screen press.
    // Velocity-aware gain so soft strikes are softer.
    const gain = 0.08 + (velocity / 127) * 0.18;
    playNote(note, 0.7, gain);
    if (onMidiNote) onMidiNote(note, velocity, true);
    flashKey(note, true);
  } else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) {
    if (onMidiNote) onMidiNote(note, 0, false);
    flashKey(note, false);
  }
}

function pkLedInit(out) {
  out.send([0xF0,0x05,0x30,0x7F,0x7F,0x20,0x00,0x0F,0x05,0xF7]);
}
function pkAllOff(out) {
  if (!out) return;
  out.send([0xF0,0x05,0x30,0x7F,0x7F,0x20,0x00,0x71,0x00,0xF7]);
}
function pkSendLed(out, pairs) {
  if (!out || !pairs.length) return;
  const msg = [0xF0,0x05,0x30,0x7F,0x7F,0x20,0x00,0x71, pairs.length & 0x7f];
  for (const [n,c] of pairs) msg.push(n & 0x7f, c & 0x7f);
  msg.push(0xF7);
  out.send(msg);
}
function pkSendOne(out, note, color) {
  if (!out) return;
  out.send([0xF0,0x05,0x30,0x7F,0x7F,0x20,0x00,0x71,1, note & 0x7f, color & 0x7f, 0xF7]);
}

function led(notes, role) {
  const color = LED_COLORS[LED_ROLE[role] || role] || LED_COLORS.green;
  if (pkOutput) {
    if (Array.isArray(notes)) pkSendLed(pkOutput, notes.map(n => [n, color]));
    else pkSendOne(pkOutput, notes, color);
  }
  // also light on-screen keyboard
  const arr = Array.isArray(notes) ? notes : [notes];
  arr.forEach(n => screenLight(n, role));
}
function ledOff(notes) {
  const arr = Array.isArray(notes) ? notes : [notes];
  if (pkOutput) {
    arr.forEach(n => pkSendOne(pkOutput, n, 0));
  }
  arr.forEach(n => screenLight(n, "off"));
}
function ledClearAll() {
  pkAllOff(pkOutput);
  document.querySelectorAll(".key").forEach(k => {
    k.className = k.className.replace(/\blit-\w+/g,"").trim();
  });
}

/* ============================================================
   4) AUDIO (multi-harmonic piano)
   ============================================================ */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function midiToFreq(n) { return 440 * Math.pow(2, (n - 69) / 12); }
function playNote(note, dur = 0.6, gain = 0.18) {
  const ctx = ensureAudio(); if (!ctx) return;
  const f = midiToFreq(note);
  const t0 = ctx.currentTime;
  const out = ctx.createGain();
  out.gain.value = 0;
  out.gain.setValueAtTime(0, t0);
  out.gain.linearRampToValueAtTime(gain, t0 + 0.01);
  out.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  out.connect(ctx.destination);
  // 4 harmonics
  [1, 2, 3, 4].forEach((h, i) => {
    const o = ctx.createOscillator();
    o.type = "sine";
    o.frequency.value = f * h;
    const g = ctx.createGain();
    g.gain.value = 1 / (h * h);
    o.connect(g).connect(out);
    o.start(t0);
    o.stop(t0 + dur + 0.05);
  });
}
function playSeq(notes, gap = 0.45, dur = 0.4) {
  const ctx = ensureAudio(); if (!ctx) return;
  notes.forEach((n, i) => setTimeout(() => playNote(n, dur), i * gap * 1000));
}
function dingCorrect() { playNote(72, 0.15, 0.08); setTimeout(() => playNote(76, 0.18, 0.1), 80); }
function buzzWrong()   { playNote(53, 0.18, 0.06); setTimeout(() => playNote(50, 0.22, 0.06), 80); }

/* ============================================================
   4b) BACKGROUND MUSIC — soft procedural pad loop, ~0.04 master
        4-chord progression I-vi-IV-V (C / Am / F / G), 8s per
        chord = 32s loop. Triple-detuned sine pads + gentle
        upper arpeggio. Quiet enough to live under lessons.
   ============================================================ */
let bgmGain = null;
let bgmTimer = null;
let bgmIsPlaying = false;
const BGM_VOL = 0.04;             // master gain, very quiet
const BGM_CHORD_LEN = 8.0;        // seconds per chord
const BGM_PROG = [
  // [pad notes (4-voice), arpeggio notes (one octave up)]
  { pad: [48, 60, 64, 67], arp: [72, 76, 79, 76] },  // C major
  { pad: [45, 57, 60, 64], arp: [69, 72, 76, 72] },  // A minor
  { pad: [41, 53, 57, 60], arp: [65, 69, 72, 69] },  // F major
  { pad: [43, 55, 59, 62], arp: [67, 71, 74, 71] },  // G major
];

function bgmPlayPad(notes, t0, dur) {
  notes.forEach(n => {
    const f = midiToFreq(n);
    const env = audioCtx.createGain();
    env.gain.value = 0;
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.18, t0 + 1.6);     // slow attack
    env.gain.linearRampToValueAtTime(0.14, t0 + dur - 1.0);
    env.gain.linearRampToValueAtTime(0, t0 + dur);        // slow release
    env.connect(bgmGain);
    // Triple-detuned sine for soft pad
    [-7, 0, 7].forEach(detune => {
      const osc = audioCtx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = f;
      osc.detune.value = detune;
      osc.connect(env);
      osc.start(t0);
      osc.stop(t0 + dur + 0.1);
    });
  });
}

function bgmPlayArp(notes, t0, perNoteSec) {
  notes.forEach((n, i) => {
    const at = t0 + i * perNoteSec;
    const f = midiToFreq(n);
    const env = audioCtx.createGain();
    env.gain.value = 0;
    env.gain.setValueAtTime(0, at);
    env.gain.linearRampToValueAtTime(0.06, at + 0.05);
    env.gain.exponentialRampToValueAtTime(0.0001, at + perNoteSec * 0.95);
    env.connect(bgmGain);
    // single soft sine + 2nd harmonic for music-box feel
    [1, 2].forEach(h => {
      const o = audioCtx.createOscillator();
      o.type = "sine";
      o.frequency.value = f * h;
      const g = audioCtx.createGain();
      g.gain.value = 1 / (h * h * 1.5);
      o.connect(g).connect(env);
      o.start(at);
      o.stop(at + perNoteSec + 0.05);
    });
  });
}

function bgmScheduleLoop() {
  if (!bgmIsPlaying || !audioCtx) return;
  const t0 = audioCtx.currentTime + 0.05;
  BGM_PROG.forEach((chord, ci) => {
    const ts = t0 + ci * BGM_CHORD_LEN;
    bgmPlayPad(chord.pad, ts, BGM_CHORD_LEN);
    bgmPlayArp(chord.arp, ts + BGM_CHORD_LEN * 0.25, BGM_CHORD_LEN * 0.18);
  });
  bgmTimer = setTimeout(bgmScheduleLoop, BGM_PROG.length * BGM_CHORD_LEN * 1000);
}

function startBgm() {
  if (bgmIsPlaying) return;
  ensureAudio();
  if (!audioCtx) return;
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0;
  bgmGain.gain.linearRampToValueAtTime(BGM_VOL, audioCtx.currentTime + 1.5); // gentle fade-in
  bgmGain.connect(audioCtx.destination);
  bgmIsPlaying = true;
  bgmScheduleLoop();
}

function stopBgm() {
  bgmIsPlaying = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
  if (bgmGain && audioCtx) {
    bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
    bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
    const g = bgmGain;
    setTimeout(() => { try { g.disconnect(); } catch (e) {} }, 1100);
  }
  bgmGain = null;
}

function toggleBgm() {
  state.bgm = !state.bgm;
  saveState();
  refreshBgmBtn();
  if (state.bgm) startBgm(); else stopBgm();
}

function refreshBgmBtn() {
  const btn = document.getElementById("bgm-toggle");
  if (btn) btn.classList.toggle("on", !!state.bgm);
}

/* ============================================================
   5) ON-SCREEN KEYBOARD (PartyKeys 36 keys, MIDI 48-83)
   ============================================================ */
const PK_LOW = 48, PK_HIGH = 83; // C3..B5 inclusive
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function noteName(n) { return NOTE_NAMES[n % 12] + Math.floor(n/12 - 1); }
function noteShort(n) { return NOTE_NAMES[n % 12]; }
function isBlack(n) { return [1,3,6,8,10].includes(n % 12); }

function buildKeyboard(container, lowOpt, highOpt) {
  const low = lowOpt || PK_LOW;    // default: PartyKeys full 36 keys (C3..B5)
  const high = highOpt || PK_HIGH;
  container.innerHTML = "";
  const kb = document.createElement("div");
  kb.className = "keyboard";
  const inner = document.createElement("div");
  inner.className = "keyboard-inner";
  kb.appendChild(inner);
  // Collect whites
  const whites = [];
  for (let n = low; n <= high; n++) if (!isBlack(n)) whites.push(n);
  const ww = 100 / whites.length;          // % per white key
  // Build whites — absolute-positioned for exact alignment with blacks
  whites.forEach((n, idx) => {
    const k = document.createElement("div");
    k.className = "key white";
    k.dataset.note = n;
    k.style.left = (idx * ww) + "%";
    k.style.width = ww + "%";
    const lab = document.createElement("span");
    lab.textContent = noteShort(n);
    k.appendChild(lab);
    k.addEventListener("pointerdown", () => virtualPress(n));
    k.addEventListener("pointerup", () => virtualRelease(n));
    k.addEventListener("pointerleave", () => virtualRelease(n));
    inner.appendChild(k);
  });
  // Build blacks — perfectly centered on boundary between adjacent whites
  let whiteIdx = 0;
  for (let n = low; n <= high; n++) {
    if (isBlack(n)) {
      const k = document.createElement("div");
      k.className = "key black";
      k.dataset.note = n;
      const bw = ww * 0.6;                 // black key width
      // boundary between white[whiteIdx-1] and white[whiteIdx] is at (whiteIdx * ww)
      k.style.left = (whiteIdx * ww - bw / 2) + "%";
      k.style.width = bw + "%";
      k.addEventListener("pointerdown", (e) => { e.stopPropagation(); virtualPress(n); });
      k.addEventListener("pointerup", (e) => { e.stopPropagation(); virtualRelease(n); });
      k.addEventListener("pointerleave", () => virtualRelease(n));
      kb.appendChild(k);
    } else {
      whiteIdx++;
    }
  }
  container.appendChild(kb);
}
function virtualPress(n) {
  ensureAudio();
  playNote(n, 0.6, 0.16);
  if (onMidiNote) onMidiNote(n, 100, true);
  flashKey(n, true);
}
function virtualRelease(n) {
  if (onMidiNote) onMidiNote(n, 0, false);
  flashKey(n, false);
}
function flashKey(n, isOn) {
  document.querySelectorAll('.key[data-note="' + n + '"]').forEach(k => {
    k.classList.toggle("pressed", isOn);
  });
}
function screenLight(n, role) {
  document.querySelectorAll('.key[data-note="' + n + '"]').forEach(k => {
    k.className = k.className.replace(/\blit-\w+/g,"").trim();
    if (role && role !== "off") {
      const colorName = LED_ROLE[role] || role;
      k.classList.add("lit-" + colorName);
    }
  });
}

/* ============================================================
   6) MASCOT — Ming-Ming the parrot, redrawn premium
   ============================================================ */
/* ---------------------------------------------------------------
   Mascot — 3D character via <model-viewer>, loading ./avatar.glb
   (glb is gltf-transform-optimized, ~260 KB). Different "moods" map
   to different camera orbits + auto-rotate behavior so the same
   model conveys happy / curious / sleepy / dancing without needing
   baked animations. Function name kept as `mingSvg` so all existing
   call sites work unchanged.
   --------------------------------------------------------------- */
function mingSvg(mood) {
  // Camera-orbit syntax: [azimuth] [polar] [distance].
  // Using "auto" for distance lets model-viewer auto-fit the bbox, so the
  // whole figure stays in frame regardless of the GLB's actual scale.
  const moods = {
    happy:   { orbit: "0deg 78deg auto",   rotate: true,  speed: "16deg" },
    scratch: { orbit: "30deg 80deg auto",  rotate: false, speed: "0deg"  },
    sleep:   { orbit: "0deg 95deg auto",   rotate: false, speed: "0deg"  },
    dance:   { orbit: "-25deg 72deg auto", rotate: true,  speed: "55deg" },
  };
  const m = moods[mood] || moods.happy;
  const rot = m.rotate ? `auto-rotate auto-rotate-delay="0" rotation-per-second="${m.speed}"` : "";
  return `<model-viewer
      class="mascot-svg mascot-3d mascot-${mood || 'happy'}"
      src="./avatar.glb"
      alt="Mascot"
      camera-orbit="${m.orbit}"
      field-of-view="32deg"
      ${rot}
      interaction-prompt="none"
      disable-zoom
      disable-pan
      camera-controls
      touch-action="pan-y"
      shadow-intensity="0.6"
      shadow-softness="1"
      exposure="1.1"
      environment-image="neutral"
      loading="eager"
      reveal="auto"
      style="background:transparent;--poster-color:transparent;"
    ></model-viewer>`;
}

function showMascot(text, mood = "happy", dur = 3500) {
  const m = document.getElementById("mascot");
  // Re-render the mascot slot with new mood. We always wrap in a
  // container with id="mascot-svg-slot" so subsequent calls find it.
  const slot = document.getElementById("mascot-svg-slot");
  slot.innerHTML = mingSvg(mood);
  document.getElementById("mascot-bubble").textContent = text;
  m.classList.add("show");
  clearTimeout(showMascot._t);
  if (dur > 0) showMascot._t = setTimeout(hideMascot, dur);
}
function hideMascot() { document.getElementById("mascot").classList.remove("show"); }

/* ============================================================
   8) PROGRESSION
   ============================================================ */
function lessonIndex(id) { return LESSONS.findIndex(l => l.id === id); }
function isUnlocked(id) {
  const i = lessonIndex(id);
  const u = lessonIndex(state.unlockedUpTo);
  return i <= u;
}
function isCompleted(id) { return (state.starsByLesson[id] || 0) > 0; }
function unlockNext(id) {
  const i = lessonIndex(id);
  if (i < LESSONS.length - 1) {
    const next = LESSONS[i + 1].id;
    if (lessonIndex(next) > lessonIndex(state.unlockedUpTo)) {
      state.unlockedUpTo = next;
    }
  }
  saveState();
}
function awardLesson(id, stars, xp) {
  const prev = state.starsByLesson[id] || 0;
  if (stars > prev) state.starsByLesson[id] = stars;
  state.xp += xp;
  while (state.xp >= state.level * 100) state.level += 1;
  // streak
  const today = new Date().toISOString().slice(0, 10);
  if (state.streakLastDay !== today) {
    const last = state.streakLastDay;
    state.streak = last && daysDiff(last, today) === 1 ? state.streak + 1 : 1;
    state.streakLastDay = today;
  }
  // hearts refill if completed without losing all
  if (state.hearts < 3 && stars >= 1) state.hearts = Math.min(3, state.hearts + 1);
  unlockNext(id);
  saveState();
}
function daysDiff(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}
