/* ============================================================
   8) PROGRESSION
   ============================================================ */
function lessonIndex(id) { return activeLessons().findIndex(l => l.id === id); }
function isUnlocked(id) {
  const i = lessonIndex(id);
  const u = lessonIndex(packProgress().unlockedUpTo);
  return i <= u;
}
function isCompleted(id) { return (packProgress().stars[id] || 0) > 0; }
function unlockNext(id) {
  const i = lessonIndex(id);
  const ls = activeLessons();
  if (i < ls.length - 1) {
    const next = ls[i + 1].id;
    if (lessonIndex(next) > lessonIndex(packProgress().unlockedUpTo)) {
      packProgress().unlockedUpTo = next;
    }
  }
  saveState();
}
function awardLesson(id, stars, xp) {
  const prog = packProgress();
  const prev = prog.stars[id] || 0;
  if (stars > prev) prog.stars[id] = stars;
  state.xp += xp;
  while (state.xp >= state.level * 100) state.level += 1;
  // streak — global across packs (one streak counts a play in either)
  const today = new Date().toISOString().slice(0, 10);
  if (state.streakLastDay !== today) {
    const last = state.streakLastDay;
    state.streak = last && daysDiff(last, today) === 1 ? state.streak + 1 : 1;
    state.streakLastDay = today;
  }
  if (state.hearts < 3 && stars >= 1) state.hearts = Math.min(3, state.hearts + 1);
  unlockNext(id);
  saveState();
}
function daysDiff(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}

/* ============================================================
   9) PATH MAP — with REAL SVG path connectors
   ============================================================ */
function moduleNodeIcon(mod, isBoss) {
  if (isBoss) return "ico-crown";
  if (mod === "melody")     return "ico-beam";
  if (mod === "chord")      return "ico-sixteenth";
  if (mod === "rhythm")     return "ico-note";
  if (mod === "onboarding") return "ico-note";
  return "ico-note";
}
function moduleBannerIcon(mod) {
  if (mod === "onboarding") return "ico-headphones";
  if (mod === "melody")     return "ico-clef";
  if (mod === "chord")      return "ico-sixteenth";
  if (mod === "rhythm")     return "ico-beam";
  return "ico-note";
}

function refreshPath() {
  const c = document.getElementById("path-container");
  c.innerHTML = "";
  activeModules().forEach((mod, mi) => {
    const block = document.createElement("div");
    block.className = "module-block";
    const banner = document.createElement("div");
    banner.className = "module-banner " + mod.id;
    const lessonsInModule = activeLessons().filter(l => l.module === mod.id);
    const completedCount = lessonsInModule.filter(l => isCompleted(l.id)).length;
    banner.innerHTML = `
      <div class="module-banner-left">
        <div class="module-banner-icon">
          <svg width="22" height="22" style="color:white"><use href="#${moduleBannerIcon(mod.id)}"/></svg>
        </div>
        <span>${t(mod.labelKey)}</span>
      </div>
      <span class="module-banner-meta">${mod.open ? `${completedCount}/${lessonsInModule.length}` : t("module_locked")}</span>
    `;
    block.appendChild(banner);
    if (!mod.open) {
      block.style.opacity = "0.5";
      c.appendChild(block);
      return;
    }
    const path = document.createElement("div");
    path.className = "path";

    // Build node positions (col index 0=left,1=center,2=right)
    const colMap = ["center", "left", "center", "right", "center", "left", "right"];
    const positions = lessonsInModule.map((les, i) => colMap[i % colMap.length]);

    // Build node rows first (for measuring)
    lessonsInModule.forEach((les, i) => {
      const row = document.createElement("div");
      row.className = "node-row";
      const slot = document.createElement("div");
      slot.className = "node-slot " + positions[i];
      const node = document.createElement("div");
      node.className = "lesson-node";
      const stars = packProgress().stars[les.id] || 0;
      const completed = stars > 0;
      const unlocked = isUnlocked(les.id);
      const isCurrent = !completed && unlocked;
      if (les.isBoss) node.classList.add("boss");
      if (completed) node.classList.add("completed");
      else if (isCurrent) node.classList.add("current");
      else if (unlocked) node.classList.add("unlocked");

      // Vector icon
      const iconId = (() => {
        if (completed) return "ico-check";
        if (les.isBoss) return "ico-crown";
        if (!unlocked) return "ico-lock";
        return moduleNodeIcon(mod.id, les.isBoss);
      })();
      node.innerHTML = `<svg><use href="#${iconId}"/></svg>`;

      // Pulsing ring (for current)
      if (isCurrent) {
        const ring = document.createElement("div");
        ring.className = "ring";
        node.appendChild(ring);
      }

      // Label
      const lab = document.createElement("div");
      lab.className = "lesson-label";
      lab.textContent = les.title[state.lang];
      node.appendChild(lab);

      // Stars
      if (completed) {
        const sd = document.createElement("div");
        sd.className = "lesson-stars";
        sd.textContent = "★".repeat(stars) + "☆".repeat(3 - stars);
        node.appendChild(sd);
      }

      if (unlocked) {
        node.addEventListener("click", () => startLesson(les.id));
      }
      slot.appendChild(node);
      row.appendChild(slot);
      path.appendChild(row);
    });

    // Real SVG connector path between nodes
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "path-svg");
    svg.setAttribute("preserveAspectRatio", "none");
    svg.innerHTML = `
      <defs>
        <linearGradient id="trackGrad-${mod.id}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${mod.id==='onboarding'?'#58CC02':mod.id==='melody'?'#1CB0F6':mod.id==='chord'?'#A560E8':'#FF9600'}"/>
          <stop offset="100%" stop-color="${mod.id==='onboarding'?'#3F9700':mod.id==='melody'?'#0E8FD0':mod.id==='chord'?'#7733C5':'#E07F00'}"/>
        </linearGradient>
      </defs>
    `;
    path.appendChild(svg);

    block.appendChild(path);
    c.appendChild(block);

    // After insertion, compute geometry and draw the SVG path through node centers
    requestAnimationFrame(() => {
      const pathRect = path.getBoundingClientRect();
      const W = pathRect.width;
      const H = pathRect.height;
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);

      const nodes = path.querySelectorAll(".lesson-node");
      const pts = [];
      nodes.forEach(n => {
        const r = n.getBoundingClientRect();
        pts.push({ x: r.left + r.width/2 - pathRect.left, y: r.top + r.height/2 - pathRect.top });
      });
      if (pts.length < 2) return;
      // Build smooth bezier path through all points
      let d = `M ${pts[0].x} ${pts[0].y}`;
      for (let i = 1; i < pts.length; i++) {
        const prev = pts[i-1], cur = pts[i];
        const midY = (prev.y + cur.y) / 2;
        d += ` C ${prev.x} ${midY}, ${cur.x} ${midY}, ${cur.x} ${cur.y}`;
      }
      // Background dashed track
      const bg = document.createElementNS(svgNS, "path");
      bg.setAttribute("class", "track-bg");
      bg.setAttribute("d", d);
      svg.appendChild(bg);

      // Filled track up to last completed/current node
      const completedFlags = lessonsInModule.map(les => {
        const stars = packProgress().stars[les.id] || 0;
        const completed = stars > 0;
        const unlocked = isUnlocked(les.id);
        const isCurrent = !completed && unlocked;
        return { completed, isCurrent };
      });
      // Find the index up to which we draw the filled path
      let lastFilledIdx = -1;
      for (let i = 0; i < completedFlags.length; i++) {
        if (completedFlags[i].completed || completedFlags[i].isCurrent) lastFilledIdx = i;
      }
      if (lastFilledIdx >= 1) {
        let fd = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 1; i <= lastFilledIdx; i++) {
          const prev = pts[i-1], cur = pts[i];
          const midY = (prev.y + cur.y) / 2;
          fd += ` C ${prev.x} ${midY}, ${cur.x} ${midY}, ${cur.x} ${cur.y}`;
        }
        const fill = document.createElementNS(svgNS, "path");
        fill.setAttribute("class", "track-fill");
        fill.setAttribute("d", fd);
        fill.setAttribute("stroke", `url(#trackGrad-${mod.id})`);
        fill.setAttribute("stroke-dasharray", "0");
        svg.appendChild(fill);
      }
    });
  });
}

/* ── Finger / technique tip generator ──
   Standard 5-finger right-hand position:
     1=Do=拇指  2=Re=食指  3=Mi=中指  4=Fa=无名指  5=Sol=小指
     6=La / 7=Si = stretch (extend pinky / cross thumb)
   Black keys use the next-lower's finger, marked as 黑键. */
const FINGER_BY_PC = [
  { zh: "拇指",       en: "Thumb"  },  // 0  C  Do
  { zh: "拇指 (#)",   en: "Thumb (#)" },// 1  C#
  { zh: "食指",       en: "Index"  },  // 2  D  Re
  { zh: "食指 (#)",   en: "Index (#)" },// 3  D#
  { zh: "中指",       en: "Middle" },  // 4  E  Mi
  { zh: "无名指",     en: "Ring"   },  // 5  F  Fa
  { zh: "无名指 (#)", en: "Ring (#)" },// 6  F#
  { zh: "小指",       en: "Pinky"  },  // 7  G  Sol
  { zh: "小指 (#)",   en: "Pinky (#)" },// 8  G#
  { zh: "扩指",       en: "Stretch"},  // 9  A  La
  { zh: "扩指 (#)",   en: "Stretch (#)" },// 10 A#
  { zh: "扩指",       en: "Stretch"},  // 11 B  Si
];
function fingerTipFor(target) {
  if (target == null) return null;
  const pc = ((target % 12) + 12) % 12;
  const oct = Math.floor(target / 12 - 1);   // 3,4,5
  const fingers = FINGER_BY_PC[pc];
  // Use solfege name regardless of pack notation — more readable in tips
  const noteName = SOLFEGE_NAMES[pc];
  // Octave hint
  const octZh = oct <= 3 ? "（低音）" : oct >= 5 ? "（高音）" : "";
  const octEn = oct <= 3 ? " (low)"  : oct >= 5 ? " (high)"  : "";
  return state.lang === "en"
    ? `${fingers.en} plays ${noteName}${octEn}`
    : `${fingers.zh}弹 ${noteName}${octZh}`;
}

/* ---------- T_ANY: tap N different keys ---------- */
function renderTAny(slot, q) {
  const card = questionCard(state.lang === "zh" ? `弹任意 ${q.count} 个键` : `Play any ${q.count} keys`, state.lang === "zh" ? "热身" : "Warm up");
  slot.appendChild(card);
  const kbWrap = document.createElement("div");
  buildKeyboard(kbWrap, PK_LOW, PK_HIGH);
  card.querySelector(".q-body").appendChild(kbWrap);
  for (let n = PK_LOW; n <= PK_HIGH; n++) led(n, "reference");
  setTimeout(() => ledClearAll(), 700);
  const tapped = new Set();
  onMidiNote = (note, vel, isOn) => {
    if (!isOn) return;
    if (note < PK_LOW || note > PK_HIGH) return;
    tapped.add(note);
    led(note, "target");
    setTimeout(() => ledOff(note), 250);
    if (tapped.size >= q.count) {
      onMidiNote = null;
      onCorrect();
    }
  };
}

/* ---------- T1: play the lit key ---------- */
function renderT1(slot, q) {
  const tip = q.tip ? (typeof q.tip === "string" ? q.tip : q.tip[state.lang] || q.tip.zh) : fingerTipFor(q.target);
  const card = questionCard(
    state.lang === "zh" ? "弹亮起来的键" : "Play the lit key",
    noteShort(q.target),
    tip);
  slot.appendChild(card);
  const kbWrap = document.createElement("div");
  buildKeyboard(kbWrap, PK_LOW, PK_HIGH);
  card.querySelector(".q-body").appendChild(kbWrap);
  led(q.target, "target");
  let attempts = 0;
  onMidiNote = (note, vel, isOn) => {
    if (!isOn) return;
    if (note === q.target) {
      onMidiNote = null;
      ledOff(q.target);
      led(q.target, "target");
      setTimeout(() => ledClearAll(), 300);
      onCorrect();
    } else {
      attempts++;
      led(note, "wrong");
      setTimeout(() => ledOff(note), 350);
      onMissAttempt(attempts, q);
    }
  };
}

/* ---------- T2: echo (listen then play) ---------- */
function renderT2(slot, q) {
  const tip = q.tip ? (typeof q.tip === "string" ? q.tip : q.tip[state.lang] || q.tip.zh) : fingerTipFor(q.target);
  const card = questionCard(
    t("q_echo"),
    state.lang === "zh" ? "听完后弹相同的音" : "Echo what you hear",
    tip);
  slot.appendChild(card);
  const replayWrap = document.createElement("div");
  replayWrap.className = "replay-wrap";
  const replay = document.createElement("button");
  replay.className = "replay-btn";
  replay.innerHTML = `<span>${t("hint_replay")}</span>`;
  replayWrap.appendChild(replay);
  card.querySelector(".q-body").appendChild(replayWrap);
  const kbWrap = document.createElement("div");
  buildKeyboard(kbWrap, PK_LOW, PK_HIGH);
  card.querySelector(".q-body").appendChild(kbWrap);
  const playTarget = () => { playNote(q.target, 0.9); led(q.target, "reference"); setTimeout(() => ledOff(q.target), 700); };
  setTimeout(playTarget, 400);
  replay.addEventListener("click", playTarget);
  let attempts = 0;
  onMidiNote = (note, vel, isOn) => {
    if (!isOn) return;
    if (note === q.target) {
      onMidiNote = null;
      onCorrect();
    } else {
      attempts++;
      led(note, "wrong");
      setTimeout(() => ledOff(note), 300);
      onMissAttempt(attempts, q);
    }
  };
}

/* ---------- T3: multiple choice ear ---------- */
function renderT3(slot, q) {
  const card = questionCard(t("q_choose"), state.lang === "zh" ? "听音后选择" : "Listen and choose");
  slot.appendChild(card);
  const replayWrap = document.createElement("div");
  replayWrap.className = "replay-wrap";
  const replay = document.createElement("button");
  replay.className = "replay-btn";
  replay.innerHTML = `<span>${t("hint_replay")}</span>`;
  replayWrap.appendChild(replay);
  card.querySelector(".q-body").appendChild(replayWrap);
  const grid = document.createElement("div");
  grid.className = "choice-grid";
  let answered = false;
  function lockChoices() {
    answered = true;
    Array.from(grid.children).forEach(c => { c.disabled = true; c.style.pointerEvents = "none"; });
  }
  q.choices.forEach(name => {
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.textContent = name;
    b.addEventListener("click", () => {
      if (answered) return;
      // Match across Western/jianpu/solfege so the option label can be
      // "Do" or "1" or "C" — whichever the lesson chose to display.
      if (noteMatches(name, q.target)) {
        b.classList.add("correct");
        lockChoices();
        onCorrect();
      } else {
        b.classList.add("wrong");
        // also reveal the actual correct option (for learning)
        Array.from(grid.children).forEach(c => {
          if (noteMatches(c.textContent, q.target)) c.classList.add("correct");
        });
        lockChoices();
        onMissFinal(q);
      }
    });
    grid.appendChild(b);
  });
  card.querySelector(".q-body").appendChild(grid);
  const playT = () => playNote(q.target, 1.0);
  setTimeout(playT, 400);
  replay.addEventListener("click", playT);
}

/* ---------- T7: sequence Simon ---------- */
function renderT7(slot, q) {
  const card = questionCard(t("q_sequence"), state.lang === "zh" ? "记住顺序，再弹回来" : "Repeat the sequence");
  slot.appendChild(card);
  const replayWrap = document.createElement("div");
  replayWrap.className = "replay-wrap";
  const replay = document.createElement("button");
  replay.className = "replay-btn";
  replay.innerHTML = `<span>${t("hint_replay")}</span>`;
  replayWrap.appendChild(replay);
  card.querySelector(".q-body").appendChild(replayWrap);
  const kbWrap = document.createElement("div");
  buildKeyboard(kbWrap, PK_LOW, PK_HIGH);
  card.querySelector(".q-body").appendChild(kbWrap);

  let stage = "demo";
  let inputIdx = 0;
  let attempts = 0;

  function demo() {
    stage = "demo";
    onMidiNote = null;
    q.sequence.forEach((n, i) => {
      setTimeout(() => {
        led(n, "target");
        playNote(n, 0.5);
        setTimeout(() => ledOff(n), 380);
      }, i * 600);
    });
    setTimeout(() => { stage = "input"; inputIdx = 0; armInput(); }, q.sequence.length * 600 + 400);
  }
  function armInput() {
    onMidiNote = (note, vel, isOn) => {
      if (!isOn || stage !== "input") return;
      const expected = q.sequence[inputIdx];
      if (note === expected) {
        led(note, "target");
        setTimeout(() => ledOff(note), 250);
        inputIdx++;
        if (inputIdx >= q.sequence.length) {
          onMidiNote = null;
          onCorrect();
        }
      } else {
        attempts++;
        led(note, "wrong");
        setTimeout(() => ledOff(note), 300);
        if (state.tone === "kid" && attempts >= 2) {
          onMidiNote = null;
          showMascot(toned({ kid: DICT.ming_demo_kid, adult: DICT.ming_demo_adult }), "scratch", 2500);
          setTimeout(() => demo(), 1200);
        } else {
          onMissAttempt(attempts, q);
        }
      }
    };
  }
  replay.addEventListener("click", demo);
  setTimeout(demo, 500);
}

/* ---------- T8: mini performance ---------- */
function renderT8(slot, q) {
  const card = questionCard(t("q_perform"), q.label || (state.lang === "zh" ? "完整弹一段" : "Play it through"));
  slot.appendChild(card);

  const pills = document.createElement("div");
  pills.className = "target-pills";
  q.sequence.forEach((n, i) => {
    const p = document.createElement("div");
    p.className = "target-pill";
    p.dataset.idx = i;
    p.textContent = noteShort(n);
    pills.appendChild(p);
  });
  card.querySelector(".q-body").appendChild(pills);

  const replayWrap = document.createElement("div");
  replayWrap.className = "replay-wrap";
  const replay = document.createElement("button");
  replay.className = "replay-btn";
  replay.innerHTML = `<span>${state.lang === "zh" ? "示范一遍" : "Demo"}</span>`;
  replayWrap.appendChild(replay);
  card.querySelector(".q-body").appendChild(replayWrap);

  const kbWrap = document.createElement("div");
  buildKeyboard(kbWrap, PK_LOW, PK_HIGH);
  card.querySelector(".q-body").appendChild(kbWrap);

  let idx = 0, errors = 0;
  function highlightCurrent() {
    Array.from(pills.children).forEach((c, i) => {
      c.classList.remove("now");
      if (i < idx) c.classList.add("done");
      else if (i === idx) c.classList.add("now");
    });
    if (idx < q.sequence.length) led(q.sequence[idx], "target");
  }
  function demo() {
    onMidiNote = null;
    q.sequence.forEach((n, i) => {
      setTimeout(() => { led(n, "target"); playNote(n, 0.5); setTimeout(() => ledOff(n), 380); }, i * (q.gap || 700));
    });
    setTimeout(() => { idx = 0; errors = 0; armInput(); highlightCurrent(); }, q.sequence.length * (q.gap || 700) + 600);
  }
  function armInput() {
    onMidiNote = (note, vel, isOn) => {
      if (!isOn) return;
      const expected = q.sequence[idx];
      if (note === expected) {
        led(expected, "target");
        setTimeout(() => ledOff(expected), 200);
        idx++;
        highlightCurrent();
        if (idx >= q.sequence.length) {
          onMidiNote = null;
          if (errors === 0) session.perfect = true;
          if (errors <= 1) session.mostlyClean = true;
          onCorrect();
        }
      } else {
        errors++;
        led(note, "wrong");
        setTimeout(() => ledOff(note), 300);
        if (state.tone === "kid" && errors >= 3) {
          onMidiNote = null;
          showMascot(toned({ kid: DICT.ming_demo_kid, adult: DICT.ming_demo_adult }), "scratch", 2500);
          setTimeout(() => demo(), 1200);
        }
      }
    };
  }
  replay.addEventListener("click", demo);
  setTimeout(demo, 600);
}

/* ---------- T_STAFF: sight-read from notation ----------
   Show a 1-line treble (or grand) staff with N notes. The note user
   should play is highlighted green on the staff AND lit on the
   keyboard via LED. Wrong key → red flash on staff & keyboard.
   On correct key, advance to next note. */
function renderT_STAFF(slot, q) {
  const tip = q.tip ? (typeof q.tip === "string" ? q.tip : q.tip[state.lang] || q.tip.zh) : null;
  const card = questionCard(
    state.lang === "zh" ? "看谱弹琴" : "Sight-read the staff",
    q.label || (state.lang === "zh" ? "按谱面顺序弹奏" : "Play the notes in order"),
    tip);
  slot.appendChild(card);
  const staffWrap = document.createElement("div");
  staffWrap.className = "staff-container";
  card.querySelector(".q-body").appendChild(staffWrap);
  const kbWrap = document.createElement("div");
  buildKeyboard(kbWrap, PK_LOW, PK_HIGH);
  card.querySelector(".q-body").appendChild(kbWrap);

  const staff = renderStaff(staffWrap, q.sequence, { grand: !!q.grand });
  let idx = 0, errors = 0;

  function highlightCurrent() {
    if (idx > 0) staff.highlight(idx - 1, "#7d8794");                     // played note: dim grey
    if (idx < q.sequence.length) {
      staff.highlight(idx, "#58CC02");                                    // current: green
      const m = (typeof q.sequence[idx] === "object") ? q.sequence[idx].midi : q.sequence[idx];
      led(m, "target");
    }
  }
  function arm() {
    onMidiNote = (note, vel, isOn) => {
      if (!isOn) return;
      const expM = (typeof q.sequence[idx] === "object") ? q.sequence[idx].midi : q.sequence[idx];
      if (note === expM) {
        ledOff(note);
        idx++;
        highlightCurrent();
        if (idx >= q.sequence.length) {
          onMidiNote = null;
          if (errors === 0) session.perfect = true;
          onCorrect();
        }
      } else {
        errors++;
        led(note, "wrong");
        setTimeout(() => ledOff(note), 300);
        if (state.tone === "kid" && errors >= 4) {
          onMidiNote = null;
          showMascot(toned({ kid: DICT.ming_demo_kid, adult: DICT.ming_demo_adult }), "scratch", 2200);
          // demo: walk through highlighting & playing each note
          setTimeout(() => {
            staff.clear(); idx = 0;
            q.sequence.forEach((s, i) => {
              const m = (typeof s === "object") ? s.midi : s;
              setTimeout(() => { led(m, "target"); playNote(m, 0.5); setTimeout(() => ledOff(m), 380); }, i * 600);
            });
            setTimeout(() => { idx = 0; errors = 0; staff.clear(); highlightCurrent(); arm(); }, q.sequence.length * 600 + 500);
          }, 1500);
        }
      }
    };
  }
  // small lead-in pause so user can read staff first
  setTimeout(() => { highlightCurrent(); arm(); }, 600);
}

/* ============================================================
   12) CORRECT / WRONG HANDLERS
   ============================================================ */
function onCorrect() {
  ledClearAll();
  dingCorrect();
  showMascot(toned({ kid: DICT.ming_correct_kid, adult: DICT.ming_correct_adult }), "happy", 1400);
  document.getElementById("cta-feedback").textContent = t("cta_correct");
  document.getElementById("cta-feedback").className = "cta-feedback win";
  document.getElementById("cta-bar").classList.add("show","win");
  document.getElementById("cta-btn").classList.remove("lose");
  document.getElementById("cta-btn").onclick = nextQuestion;
  // Faint green hint on the shortcut key — keep-alive every 1.5s
  startHintLed();
}

function onMissAttempt(attempts, q) {
  buzzWrong();
  session.totalMisses++;
  if (state.tone === "kid") {
    if (attempts >= 3) {
      showMascot(toned({ kid: DICT.ming_demo_kid, adult: DICT.ming_demo_adult }), "scratch", 2200);
      setTimeout(() => {
        if (q.target != null) { led(q.target, "target"); playNote(q.target, 0.7); setTimeout(() => { ledClearAll(); onCorrect(); }, 1200); }
        else { onCorrect(); }
      }, 1500);
    } else {
      showMascot(toned({ kid: DICT.ming_wrong_kid, adult: DICT.ming_wrong_adult }), "scratch", 1500);
    }
  } else {
    state.hearts = Math.max(0, state.hearts - 1);
    saveState(); refreshTopbar();
    if (state.hearts <= 0) endLesson(false);
    else showMascot(toned({ kid: DICT.ming_wrong_kid, adult: DICT.ming_wrong_adult }), "scratch", 1500);
  }
}

function onMissFinal(q) {
  buzzWrong();
  session.totalMisses++;
  if (state.tone === "adult") {
    state.hearts = Math.max(0, state.hearts - 1);
    saveState(); refreshTopbar();
    if (state.hearts <= 0) { endLesson(false); return; }
  }
  document.getElementById("cta-feedback").textContent = t("cta_wrong");
  document.getElementById("cta-feedback").className = "cta-feedback lose";
  document.getElementById("cta-bar").classList.add("show","lose");
  document.getElementById("cta-btn").classList.add("lose");
  document.getElementById("cta-btn").onclick = nextQuestion;
  // Faint green hint on the shortcut key — also active after a wrong answer
  startHintLed();
}

function nextQuestion() {
  stopHintLed();
  document.getElementById("cta-bar").classList.remove("show","win","lose");
  document.getElementById("cta-btn").classList.remove("lose");
  session.qIndex++;
  if (session.qIndex >= session.questions.length) {
    endLesson(true);
  } else {
    renderQuestion();
  }
}

/* ============================================================
   12.5) CONFETTI for perfect runs
   ============================================================ */
function fireConfetti() {
  const canvas = document.getElementById("confetti-canvas");
  canvas.innerHTML = "";
  const colors = ["#58CC02", "#FFC800", "#1CB0F6", "#A560E8", "#FF9600", "#FF4B4B"];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    const c = colors[i % colors.length];
    piece.style.background = c;
    piece.style.left = (Math.random() * 100) + "%";
    piece.style.width = (6 + Math.random() * 8) + "px";
    piece.style.height = (10 + Math.random() * 10) + "px";
    piece.style.borderRadius = (Math.random() < 0.4 ? "50%" : "2px");
    const driftX = (Math.random() - 0.5) * 320;
    const fallY = window.innerHeight + 80;
    const dur = 1500 + Math.random() * 1800;
    const delay = Math.random() * 400;
    const rot = (Math.random() - 0.5) * 720;
    piece.animate([
      { transform: `translate(0,-20px) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${driftX*0.5}px, ${fallY*0.5}px) rotate(${rot/2}deg)`, opacity: 1, offset: 0.6 },
      { transform: `translate(${driftX}px, ${fallY}px) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: dur, delay: delay, easing: "cubic-bezier(.2,.6,.4,1)", fill: "forwards" });
    canvas.appendChild(piece);
  }
  setTimeout(() => { canvas.innerHTML = ""; }, 3500);
}

function endLesson(win) {
  hideMascot();
  ledClearAll();
  onMidiNote = null;
  const total = session.questions.length;
  const misses = session.totalMisses;
  let stars = 0;
  if (win) {
    if (misses === 0) stars = 3;
    else if (misses <= 1) stars = 2;
    else stars = 1;
  } else {
    stars = 0;
  }
  const lesson = session.lesson;
  const baseXp = lesson.bossXp || 10;
  const bonus = stars >= 3 ? 5 : 0;
  const xpEarned = win ? baseXp + bonus : 0;
  if (win) awardLesson(lesson.id, stars, xpEarned);
  document.getElementById("result-xp").textContent = xpEarned;
  document.getElementById("result-streak").textContent = state.streak;
  ["star-1","star-2","star-3"].forEach((id, i) => {
    document.getElementById(id).classList.remove("on");
  });
  // Stagger star appearance
  setTimeout(() => {
    ["star-1","star-2","star-3"].forEach((id, i) => {
      setTimeout(() => {
        if (i < stars) document.getElementById(id).classList.add("on");
      }, i * 220);
    });
  }, 200);

  const hdr = document.getElementById("view-result").querySelector(".result-header");
  hdr.textContent = stars >= 3 ? t("starbar_perfect") : stars >= 2 ? t("starbar_good") : (win ? t("starbar_pass") : (state.lang === "zh" ? "再来一次" : "Try again"));
  hdr.style.color = win ? "var(--green-deep)" : "var(--red-deep)";
  // subhead
  const sub = document.getElementById("result-sub");
  if (sub) {
    sub.textContent = win
      ? (state.lang === "zh" ? lesson.title.zh : (lesson.title.en || lesson.title.zh))
      : (state.lang === "zh" ? "爱心耗尽，再试一次" : "Out of hearts — try again");
  }
  document.getElementById("mascot-result").innerHTML = mingSvg(stars >= 3 ? "dance" : (win ? "happy" : "scratch"));
  const mr = document.getElementById("mascot-result").querySelector("model-viewer, svg");
  if (mr) { mr.style.width = "180px"; mr.style.height = "180px"; }
  document.getElementById("result-continue").onclick = () => { stopHintLed(); ledClearAll(); showView("view-home"); };
  showView("view-result");
  // Hint LED on result page too — keep-alive
  startHintLed();

  // Confetti for perfect runs only
  if (stars >= 3) {
    setTimeout(fireConfetti, 700);
    setTimeout(fireConfetti, 1500);
  }
}

/* ============================================================
   13) INIT
   ============================================================ */
function bindUI() {
  document.getElementById("lang-zh").onclick = () => setLang("zh");
  document.getElementById("lang-en").onclick = () => setLang("en");
  document.getElementById("tone-kid").onclick   = () => setTone("kid");
  document.getElementById("tone-adult").onclick = () => setTone("adult");
  document.getElementById("btn-quit").onclick = () => { stopHintLed(); onMidiNote = null; ledClearAll(); hideMascot(); showView("view-home"); };
  document.getElementById("gate-retry").onclick = () => initMidi();
  document.getElementById("gate-demo").onclick = () => { demoMode = true; setMidiPill("Demo mode", "warning"); showView("view-home"); };
  document.getElementById("gate-mascot").innerHTML = mingSvg("happy");
  const gm = document.getElementById("gate-mascot").querySelector("model-viewer, svg");
  if (gm) { gm.style.width = "180px"; gm.style.height = "180px"; }
  const bgmBtn = document.getElementById("bgm-toggle");
  if (bgmBtn) bgmBtn.onclick = toggleBgm;
  // Pack tabs
  document.querySelectorAll(".pack-tab").forEach(tab => {
    tab.onclick = () => setActivePack(tab.dataset.pack);
  });
}

function init() {
  bindUI();
  refreshToggles();
  refreshBgmBtn();
  refreshPackTabs();
  applyI18n();
  refreshTopbar();
  refreshPath();
  showMascot(toned({ kid: DICT.ming_intro_kid, adult: DICT.ming_intro_adult }), "happy", 4000);
  initMidi();
  // Audio context can only start after a user gesture. On the first
  // interaction, kick the audio context awake — and if BGM was on
  // last session, resume it.
  document.addEventListener("pointerdown", () => {
    ensureAudio();
    if (state.bgm && !bgmIsPlaying) startBgm();
  }, { once: true });
}
init();
